<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <style>
      .page { fill: #070707; }
      .card { fill: #151515; stroke: #2b2b2b; stroke-width: 2; }
      .label { fill: #fff; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif; font-size: 34px; font-weight: 900; letter-spacing: 0; }
      .title { fill: #fff; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif; font-size: 36px; font-weight: 900; letter-spacing: 0; }
      .hint { fill: #aaa; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif; font-size: 20px; font-weight: 650; letter-spacing: 0; }
      .word { fill: #fff; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif; font-size: 54px; font-weight: 900; letter-spacing: -1px; }
      .redWord { fill: #ff0033; }
      .red { fill: #ff0033; }
      .red2 { fill: #f7002e; }
      .white { fill: #fff; }
    </style>
  </defs>

  <rect class="page" width="1200" height="900"/>
  <text x="60" y="76" class="title">SimaTube logo, cleaned up</text>
  <text x="60" y="112" class="hint">Same vibe as the one you liked. Pick A, B, C, or D.</text>

  <g transform="translate(60 155)">
    <rect class="card" width="520" height="310" rx="28"/>
    <text x="32" y="56" class="label">A</text>
    <g transform="translate(96 89)">
      <circle class="red" cx="70" cy="70" r="70"/>
      <path class="white" d="M84 35H58c-17 0-30 10-30 25 0 13 9 21 27 25l20 4c8 2 12 5 12 10 0 6-6 10-16 10H34v-22h35c5 0 8-2 8-5s-3-4-8-5l-20-4c-18-4-28-13-28-28 0-17 14-29 36-29h27v19Z"/>
    </g>
    <text x="252" y="178" class="word">Sima<tspan class="redWord">Tube</tspan></text>
  </g>

  <g transform="translate(620 155)">
    <rect class="card" width="520" height="310" rx="28"/>
    <text x="32" y="56" class="label">B</text>
    <g transform="translate(92 89)">
      <rect class="red" width="154" height="140" rx="39"/>
      <path class="white" d="M94 38H58c-16 0-28 10-28 24 0 13 9 21 26 24l24 5c8 2 12 5 12 10 0 6-6 10-16 10H35V90h38c5 0 8-2 8-5s-3-4-8-5l-24-5c-18-4-28-13-28-28 0-17 14-29 36-29h37v20Z"/>
    </g>
    <text x="252" y="178" class="word">Sima<tspan class="redWord">Tube</tspan></text>
  </g>

  <g transform="translate(60 505)">
    <rect class="card" width="520" height="310" rx="28"/>
    <text x="32" y="56" class="label">C</text>
    <g transform="translate(94 86)">
      <circle class="red2" cx="73" cy="73" r="73"/>
      <text x="73" y="101" text-anchor="middle" class="white" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Arial, sans-serif" font-size="92" font-weight="950">S</text>
    </g>
    <text x="252" y="178" class="word">Sima<tspan class="redWord">Tube</tspan></text>
  </g>

  <g transform="translate(620 505)">
    <rect class="card" width="520" height="310" rx="28"/>
    <text x="32" y="56" class="label">D</text>
    <g transform="translate(92 86)">
      <rect class="red2" width="146" height="146" rx="40"/>
      <path d="M101 44c-12-15-43-15-56 0-11 13-1 24 27 29 29 5 40 17 29 33-13 18-45 17-59 3" fill="none" stroke="#fff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="252" y="178" class="word">Sima<tspan class="redWord">Tube</tspan></text>
  </g>
</svg>
